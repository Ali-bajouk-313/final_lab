
<div class="Welcome">
    
    <h1>Welcome Back</h1>

    <h2>Sign in to your AB Fashion account</h2>
</div>

<div class="auth-container">

    <div class="auth-card">


        <form [formGroup]="loginform" (ngSubmit)="login()">

            <div class="form-group">

                <label>Email</label>

                <input type="email" placeholder="Enter your email" formControlName="email">



            </div>

            <div class="form-group">

                <label>Password</label>
                
                <input type="password" placeholder="Enter your password" formControlName="password">

                @if(loginform.controls['password'].touched &&
                loginform.controls['password'].hasError('minlength')){
                    <small class="error">
                        Password must be at least 6 characters
                    </small>
                }

            </div>

            <button class="auth-button" type="submit">Login</button>

        </form>

        

        <div class="auth-link">

            Don't have an account?

            <a routerLink="/register">
                Register
            </a>

        </div>

    </div>

</div>
