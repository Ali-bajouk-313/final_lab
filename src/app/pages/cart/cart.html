<div class="cart-container">


<h1>Your Cart</h1>


    @if(carts().length === 0){

        <p>
            Your carts is empty.
        </p>

    }
    @else {


    @for(item of carts(); track item.id){

    <div class="cart-item">

    <img 
    [src]="item.image"
    [alt]="item.title">


    <div>
        <h3>
        {{item.title}}
        </h3>
        <p>
        Price: ${{item.price}}
        </p>

        <p>
        Quantity: {{item.quantity}}
        </p>

    </div>


    <button
    (click)="remove(item.id)">
    Remove
    </button>


    </div>


    }

    <button
    (click)="clear()">
    Clear Cart
    </button>


    }


</div>
