<h2>
Products
</h2>


<div class="products-container">


@for(product of products; track product.id)
{
<a [routerLink]="['/shop', product.id]">
    <div class="product-card">
    <img [src]="product.image">


    <h3>
    {{product.title}}
    </h3>


    <p>
    {{product.price}} $
    </p>


    </div>
</a>
<hr>
}


</div>
