@if(showForm()){


<div class="product-form">


<h2>

{{selectedProduct().id ? 
'Edit Product' :
'Add Product'}}

</h2>

<input

placeholder="Title"

[(ngModel)]="selectedProduct().title"

/>

<input

placeholder="Price"

type="number"

[(ngModel)]="selectedProduct().price"

/>

<input

placeholder="Category"

[(ngModel)]="selectedProduct().category"

/>



<input

placeholder="Image URL"

[(ngModel)]="selectedProduct().image"

/>



<textarea

placeholder="Description"

[(ngModel)]="selectedProduct().description">

</textarea>




<div class="form-buttons">


<button

(click)="saveProduct()">

Save

</button>



<button

(click)="closeForm()">

Cancel

</button>


</div>


</div>


}



<div class="top">


<div class="top-bar">


<h1 class="title">

Products

</h1>



<input

class="search-input"

placeholder="Search products..."

(input)="search($event)"

/>



<button

class="add-btn"

(click)="addProduct()">

+ Add Product

</button>


</div>




<ag-grid-angular

class="ag-theme-alpine"

[rowData]="products()"

[columnDefs]="columnDefs"

domLayout="autoHeight">

</ag-grid-angular>



</div>
